<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts — Archive</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer, .content-container {
            width: 100%;
            max-width: 800px;
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 60px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .series-item {
            margin-bottom: 60px;
            width: 100%;
        }

        .series-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .media-container {
            width: 100%;
            background-color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
            text-align: justify;
        }

        .admin-trigger {
            margin-top: 40px;
            font-size: 10px;
            color: #e0e0e0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-trigger:hover {
            color: #000;
        }

        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.99);
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-layout {
            max-width: 800px;
            margin: 40px auto 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-form h3, .admin-manage h3 {
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .admin-form input, .admin-form textarea {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 12px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .checkbox-container input {
            width: auto;
            cursor: pointer;
        }

        .admin-form button, .action-btn {
            background: #000;
            color: #fff;
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .admin-form button:hover {
            background: #333;
        }

        .admin-manage {
            border-left: 1px solid #eee;
            padding-left: 20px;
        }
        @media (max-width: 768px) {
            .admin-manage {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #eee;
                padding-top: 20px;
            }
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 12px;
            gap: 10px;
        }

        .manage-item-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
            max-width: 200px;
        }

        .manage-item-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            font-size: 9px;
            color: #999;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .manage-buttons {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 6px 10px;
            font-size: 10px;
        }
        .edit-btn {
            background: #2196F3;
        }
        .edit-btn:hover {
            background: #0b7dda;
        }
        .delete-btn {
            background: #ff4d4d;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <div class="content-container" id="articles-list">
        <p id="loading-text">Synchronizing with GitHub archive...</p>
    </div>

    <footer>
        <div class="nav-links">
            <a href="#">Notifications</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
        <div style="text-align: center;">
            <span class="admin-trigger" onclick="toggleAdmin()">• admin login</span>
        </div>
    </footer>

    <div id="admin-panel">
        <div style="max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <button id="cancel-edit-header-btn" style="background:#fff; color:#ff4d4d; border: 1px solid #ff4d4d; font-family: monospace; padding: 8px 16px; cursor:pointer; display:none;" onclick="resetForm()">CANCEL EDIT MODE</button>
            <span style="flex-grow: 1;"></span>
            <button style="background:#eee; color:#000; border: 1px solid #ccc; font-family: monospace; padding: 8px 16px; cursor:pointer;" onclick="toggleAdmin()">CLOSE DASHBOARD</button>
        </div>
        
        <div class="admin-layout">
            <div class="admin-form">
                <h3 id="form-mode-title">[ Append to Archive ]</h3>
                <input type="password" id="gh-token" placeholder="GitHub Personal Access Token">
                <input type="text" id="post-title" placeholder="TITLE (e.g. SERIES 01: BIO POP)">
                <input type="text" id="post-date" placeholder="DATE & STATUS (e.g. THE ORIGIN, 2025)">
                <input type="text" id="post-img" placeholder="Image asset filename (e.g. asset.png)">
                <textarea id="post-text" rows="8" placeholder="Editorial text body content..."></textarea>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="post-draft">
                    Save as Draft (Hide from main page)
                </label>
                
                <button id="save-btn" onclick="savePost()">Publish</button>
            </div>

            <div class="admin-manage">
                <h3>[ Archive Management ]</h3>
                <div id="manage-list">
                    <p style="font-size: 11px; color: #999;">Initializing registry interface...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'WebWklep';
        const REPO = 'TripleStar';
        const FILE_PATH = 'data.json';
        
        let localPostsArray = [];
        let editIndex = null;

        // Безопасное декодирование UTF-8 Base64 без вылетов
        function decodeBase64UTF8(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        // Безопасное кодирование UTF-8 Base64 без вылетов
        function encodeBase64UTF8(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        async function loadPosts() {
            const listContainer = document.getElementById('articles-list');
            const manageContainer = document.getElementById('manage-list');
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
                localPostsArray = await response.json();
                
                const visiblePosts = localPostsArray.filter(post => !post.isDraft);
                
                if (visiblePosts.length === 0) {
                    listContainer.innerHTML = '<p style="font-size:12px; color:#999; text-align:center; margin-top:40px;">Archive index is empty or entries are currently set to draft.</p>';
                } else {
                    listContainer.innerHTML = '';
                    visiblePosts.forEach(post => {
                        const item = document.createElement('div');
                        item.className = 'series-item';
                        item.innerHTML = `
                            <div class="series-header">
                                <span>${post.title}</span>
                                <span>${post.date}</span>
                            </div>
                            ${post.img ? `
                            <div class="media-container">
                                <img src="${post.img}" alt="${post.title}">
                            </div>` : ''}
                            <div class="description">${post.text}</div>
                        `;
                        listContainer.appendChild(item);
                    });
                }

                if (localPostsArray.length === 0) {
                    manageContainer.innerHTML = '<p style="font-size:11px; color:#999;">No entries found in dataset.</p>';
                    return;
                }

                manageContainer.innerHTML = '';
                localPostsArray.forEach((post, index) => {
                    const mItem = document.createElement('div');
                    mItem.className = 'manage-item';
                    const statusText = post.isDraft ? '👁‍🗨 Draft / Hidden' : '👁 Public View';

                    mItem.innerHTML = `
                        <div class="manage-item-meta">
                            <span class="manage-item-title">${post.title || '[Untitled Entry]'}</span>
                            <span class="status-badge">${statusText}</span>
                        </div>
                        <div class="manage-buttons">
                            <button class="action-btn edit-btn" onclick="startEdit(${index})">Edit</button>
                            <button class="action-btn delete-btn" onclick="deletePost(${index})">Delete</button>
                        </div>
                    `;
                    manageContainer.appendChild(mItem);
                });

            } catch (err) {
                listContainer.innerHTML = '<p style="font-size:12px; color:red;">System sync error occurred. Check if data.json is valid.</p>';
                console.error(err);
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function startEdit(index) {
            editIndex = index;
