<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts — Archive</title>
    <style>
        /* Стартовый экран (Landing) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
            cursor: pointer;
        }

        #splash-screen img {
            width: 80%;
            max-width: 450px;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        .enter-btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #ffffff;
            padding: 10px 20px;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        
        #splash-screen:hover .enter-btn {
            background: #ffffff;
            color: #000000;
        }

        /* Основной сайт */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 140px 20px 60px 20px; /* Отступы под верхнее лого и нижнее сердечко */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
        }

        /* Мелкое оригинальное лого в левом верхнем углу */
        .site-logo-container {
            position: absolute;
            top: 30px;
            left: 40px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .site-logo-container img {
            width: 50px; /* Аккуратный мелкий размер */
            height: auto;
            display: block;
            /* Никакой инверсии цвета, оставляем оригинальный синий */
        }

        .content-container {
            width: 100%;
            max-width: 800px;
        }

        .series-item {
            margin-bottom: 60px;
            width: 100%;
        }

        .series-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .media-container {
            width: 100%;
            background-color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
            text-align: justify;
        }

        /* Админ-логин в правом нижнем углу */
        .admin-trigger {
            position: fixed;
            bottom: 25px;
            right: 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            color: #d0d0d0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
            user-select: none;
            z-index: 999;
        }
        .admin-trigger:hover {
            color: #000000;
            transform: scale(1.1);
        }

        /* Панель управления */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.99);
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-layout {
            max-width: 800px;
            margin: 40px auto 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 100px;
            }
            .site-logo-container {
                left: 20px;
                top: 20px;
            }
            .admin-trigger {
                bottom: 20px;
                right: 20px;
            }
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-form h3, .admin-manage h3 {
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .admin-form input, .admin-form textarea {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 12px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .checkbox-container input {
            width: auto;
            cursor: pointer;
        }

        .admin-form button, .action-btn {
            background: #000;
            color: #fff;
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .admin-form button:hover {
            background: #333;
        }

        .admin-manage {
            border-left: 1px solid #eee;
            padding-left: 20px;
        }
        @media (max-width: 768px) {
            .admin-manage {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #eee;
                padding-top: 20px;
            }
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 12px;
            gap: 10px;
        }

        .manage-item-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
            max-width: 200px;
        }

        .manage-item-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            font-size: 9px;
            color: #999;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .manage-buttons {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 6px 10px;
            font-size: 10px;
        }
        .edit-btn {
            background: #2196F3;
        }
        .edit-btn:hover {
            background: #0b7dda;
        }
        .delete-btn {
            background: #ff4d4d;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
        
        #sync-status {
            font-size: 11px;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Заставка (Стартовая страница) -->
    <div id="splash-screen" onclick="exitSplash()">
        <img src="3star_big_spray.png" alt="TripleStar Core">
        <button class="enter-btn">Enter Archive</button>
    </div>

    <!-- Мелкое лого сбоку в архиве (Без инверсии цвета) -->
    <div class="site-logo-container" onclick="showSplash()">
        <img src="3star_big_spray.png" alt="Logo">
    </div>

    <!-- Главный контейнер архива -->
    <div class="content-container" id="articles-list">
        <p>Connecting to archive nodes...</p>
    </div>

    <!-- Кнопка админки в правом нижнем углу -->
    <span class="admin-trigger" onclick="toggleAdmin()">&lt;3</span>

    <!-- Панель управления (Dashboard) -->
    <div id="admin-panel">
        <div style="max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <button id="cancel-edit-header-btn" style="background:#fff; color:#ff4d4d; border: 1px solid #ff4d4d; font-family: monospace; padding: 8px 16px; cursor:pointer; display:none;" onclick="resetForm()">CANCEL EDIT MODE</button>
            <span style="flex-grow: 1;"></span>
            <button style="background:#eee; color:#000; border: 1px solid #ccc; font-family: monospace; padding: 8px 16px; cursor:pointer;" onclick="toggleAdmin()">CLOSE DASHBOARD</button>
        </div>
        
        <div class="admin-layout">
            <div class="admin-form">
                <h3 id="form-mode-title">[ Append to Archive ]</h3>
                <input type="password" id="gh-token" placeholder="GitHub Personal Access Token" oninput="saveTokenLocally(this.value)">
                <input type="text" id="post-title" placeholder="TITLE (e.g. TEST POST)">
                <input type="text" id="post-date" placeholder="DATE & STATUS (e.g. 2026)">
                <input type="text" id="post-img" placeholder="Image asset filename (optional)">
                <textarea id="post-text" rows="8" placeholder="Editorial text body content..."></textarea>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="post-draft">
                    Save as Draft (Hide from main page)
                </label>
                
                <button id="save-btn" onclick="savePost()">Publish to GitHub</button>
            </div>

            <div class="admin-manage">
                <h3>[ Archive Management ]</h3>
                <div id="sync-status" style="color: #666;">Awaiting token credentials...</div>
                <div id="manage-list"></div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'WebWklep';
        const REPO = 'TripleStar';
        const FILE_PATH = 'data.json';
        
        let localPostsArray = [];
        let editIndex = null;
        let token = localStorage.getItem('gh_stored_token') || '';

        function exitSplash() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.visibility = 'hidden';
            }, 500);
        }

        function showSplash() {
            const splash = document.getElementById('splash-screen');
            splash.style.visibility = 'visible';
            splash.style.opacity = '1';
        }

        function decodeBase64UTF8(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        function encodeBase64UTF8(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        function saveTokenLocally(val) {
            token = val.trim();
            localStorage.setItem('gh_stored_token', token);
            if (token.length > 10) {
                loadPosts();
            }
        }

        async function loadPosts() {
            const listContainer = document.getElementById('articles-list');
            const statusBadge = document.getElementById('sync-status');
            
            if (token) {
                document.getElementById('gh-token').value = token;
            }

            try {
                let apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
                let headers = {};
                if (token) headers['Authorization'] = `Bearer ${token}`;

                let apiRes = await fetch(apiUrl, { headers: headers });
                if (apiRes.ok) {
                    let fileData = await apiRes.json();
                    localPostsArray = JSON.parse(decodeBase64UTF8(fileData.content));
                } else {
                    localPostsArray = [];
                }

                statusBadge.innerText = token ? "✓ REGISTRY SYNC OPERATIONAL" : "Awaiting token credentials...";
                statusBadge.style.color = token ? "green" : "#666";
                renderUI();

            } catch (err) {
                statusBadge.innerText = `✕ SYNC FAULT: ${err.message}`;
                statusBadge.style.color = "red";
                listContainer.innerHTML = `<p style="color:red; text-align:center;">Sync Loop Interrupted.</p>`;
            }
        }

        function renderUI() {
            const listContainer = document.getElementById('articles-list');
            const manageContainer = document.getElementById('manage-list');

            if (!Array.isArray(localPostsArray)) localPostsArray = [];

            const visiblePosts = localPostsArray.filter(post => !post.isDraft);
            if (visiblePosts.length === 0) {
                listContainer.innerHTML = '<p style="font-size:12px; color:#999; text-align:center; margin-top:40px;">Archive index is empty.</p>';
            } else {
                listContainer.innerHTML = '';
                visiblePosts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'series-item';
                    item.innerHTML = `
                        <div class="series-header">
                            <span>${post.title || ''}</span>
                            <span>${post.date || ''}</span>
                        </div>
                        ${post.img ? `
                        <div class="media-container">
                            <img src="${post.img}" alt="${post.title || ''}">
                        </div>` : ''}
                        <div class="description">${post.text || ''}</div>
                    `;
                    listContainer.appendChild(item);
                });
            }

            manageContainer.innerHTML = '';
            localPostsArray.forEach((post, index) => {
                const mItem = document.createElement('div');
                mItem.className = 'manage-item';
                const statusText = post.isDraft ? '👁‍🗨 Draft' : '👁 Public';

                mItem.innerHTML = `
                    <div class="manage-item-meta">
                        <span class="manage-item-title">${post.title || '[Untitled]'}</span>
                        <span class="status-badge">${statusText}</span>
                    </div>
                    <div class="manage-buttons">
                        <button class="action-btn edit-btn" onclick="startEdit(${index})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deletePost(${index})">Delete</button>
                    </div>
                `;
                manageContainer.appendChild(mItem);
            });
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            if (token) {
                document.getElementById('gh-token').value = token;
            }
        }

        function startEdit(index) {
            editIndex = index;
            const post = localPostsArray[index];
            document.getElementById('post-title').value = post.title || '';
            document.getElementById('post-date').value = post.date || '';
            document.getElementById('post-img').value = post.img || '';
            document.getElementById('post-text').value = post.text || '';
            document.getElementById('post-draft').checked = !!post.isDraft;
            
            document.getElementById('form-mode-title').innerText = `[ Modify Entry #${index + 1} ]`;
            document.getElementById('save-btn').innerText = 'Push Modifications';
            document.getElementById('cancel-edit-header-btn').style.display = 'inline-block';
        }

        function resetForm() {
            editIndex = null;
            document.getElementById('post-title').value = '';
            document.getElementById('post-date').value = '';
            document.getElementById('post-img').value = '';
            document.getElementById('post-text').value = '';
            document.getElementById('post-draft').checked = false;
            document.getElementById('form-mode-title').innerText = '[ Append to Archive ]';
            document.getElementById('save-btn').innerText = 'Publish to GitHub';
            document.getElementById('cancel-edit-header-btn').style.display = 'none';
        }

        async function pushToGitHub(updatedArray, commitMessage) {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            let sha = '';
            
            let getRes = await fetch(`${url}?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (getRes.ok) {
                const getData = await getRes.json();
                sha = getData.sha;
            }

            const updatedContent = encodeBase64UTF8(JSON.stringify(updatedArray, null, 2));
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: commitMessage,
                    content: updatedContent,
                    sha: sha
                })
            });

            if (!putRes.ok) {
                let errData = await putRes.json();
                throw new Error(errData.message || 'Server Reject');
            }

            return true;
        }

        async function savePost() {
            const currentToken = document.getElementById('gh-token').value.trim();
            const title = document.getElementById('post-title').value.trim();
            const date = document.getElementById('post-date').value.trim();
            const img = document.getElementById('post-img').value.trim();
            const text = document.getElementById('post-text').value.trim();
            const isDraft = document.getElementById('post-draft').checked;
            const btn = document.getElementById('save-btn');

            if (currentToken) {
                token = currentToken;
                localStorage.setItem('gh_stored_token', token);
            }

            if (!token) return alert('Token required.');

            btn.disabled = true;
            btn.innerText = 'Syncing...';

            try {
                let nextPosts = [...localPostsArray];
                let commitMsg = '';

                if (editIndex !== null) {
                    nextPosts[editIndex] = { title, date, img, text, isDraft };
                    commitMsg = `Update: ${title || 'Entry'}`;
                } else {
                    nextPosts.unshift({ title, date, img, text, isDraft });
                    commitMsg = `Add: ${title || 'Entry'}`;
                }

                await pushToGitHub(nextPosts, commitMsg);
                alert('Success! Content pushed.');
                resetForm();
                
                setTimeout(async () => {
                    await loadPosts();
                }, 1000);

            } catch (err) {
                alert(`API Error: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerText = editIndex !== null ? 'Push Modifications' : 'Publish to GitHub';
            }
        }

        async function deletePost(index) {
            if (!token) return alert('Token missing.');
            if (!confirm(`Delete entry?`)) return;

            try {
                const nextPosts = localPostsArray.filter((_, i) => i !== index);
                await pushToGitHub(nextPosts, `Delete index ${index}`);
                alert('Deleted.');
                if (editIndex === index) resetForm();
                
                setTimeout(async () => {
                    await loadPosts();
                }, 1000);
            } catch (err) {
                alert(`Error: ${err.message}`);
            }
        }

        loadPosts();
    </script>
</body>
</html>
