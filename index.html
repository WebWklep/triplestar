<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts — Archive</title>
    <style>
        /* Стили полностью скопированы с эстетики референса */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer, .content-container {
            width: 100%;
            max-width: 800px;
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 60px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .series-item {
            margin-bottom: 60px;
            width: 100%;
        }

        .series-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .media-container {
            width: 100%;
            background-color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
            text-align: justify;
        }

        /* Скрытый вход в админку */
        .admin-trigger {
            margin-top: 40px;
            font-size: 10px;
            color: #e0e0e0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-trigger:hover {
            color: #000;
        }

        /* Панель управления */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.99);
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-layout {
            max-width: 800px;
            margin: 40px auto 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-form h3, .admin-manage h3 {
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .admin-form input, .admin-form textarea {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 12px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }

        .admin-form button, .action-btn {
            background: #000;
            color: #fff;
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .admin-form button:hover {
            background: #333;
        }

        /* Управление существующими постами */
        .admin-manage {
            border-left: 1px solid #eee;
            padding-left: 20px;
        }
        @media (max-width: 768px) {
            .admin-manage {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #eee;
                padding-top: 20px;
            }
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 12px;
            gap: 10px;
        }

        .manage-item-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-grow: 1;
            max-width: 200px;
        }

        .manage-buttons {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 6px 10px;
            font-size: 10px;
        }
        .edit-btn {
            background: #2196F3;
        }
        .edit-btn:hover {
            background: #0b7dda;
        }
        .delete-btn {
            background: #ff4d4d;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <!-- Сюда статьи будут выводиться автоматически -->
    <div class="content-container" id="articles-list">
        <p id="loading-text">Синхронизация с архивом GitHub...</p>
    </div>

    <footer>
        <div class="nav-links">
            <a href="#">Notifications</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
        <div style="text-align: center;">
            <span class="admin-trigger" onclick="toggleAdmin()">• admin login</span>
        </div>
    </footer>

    <!-- Панель админа -->
    <div id="admin-panel">
        <div style="max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <button id="cancel-edit-header-btn" style="background:#fff; color:#ff4d4d; border: 1px solid #ff4d4d; font-family: monospace; padding: 8px 16px; cursor:pointer; display:none;" onclick="resetForm()">ОТМЕНИТЬ РЕДАКТИРОВАНИЕ</button>
            <span style="flex-grow: 1;"></span>
            <button style="background:#eee; color:#000; border: 1px solid #ccc; font-family: monospace; padding: 8px 16px; cursor:pointer;" onclick="toggleAdmin()">ЗАКРЫТЬ АДМИНКУ</button>
        </div>
        
        <div class="admin-layout">
            <!-- Левая колонка: Форма добавления/редактирования -->
            <div class="admin-form">
                <h3 id="form-mode-title">[ Добавить в архив ]</h3>
                <input type="password" id="gh-token" placeholder="GitHub Personal Access Token">
                <input type="text" id="post-title" placeholder="НАЗВАНИЕ (SERIES 01: BIO POP)">
                <input type="text" id="post-date" placeholder="ДАТА И СТАТУС (THE ORIGIN, 2025)">
                <input type="text" id="post-img" placeholder="Имя файла картинки (photo.png)">
                <textarea id="post-text" rows="8" placeholder="Текст статьи..."></textarea>
                <button id="save-btn" onclick="savePost()">Опубликовать</button>
            </div>

            <!-- Правая колонка: Управление существующими материалами -->
            <div class="admin-manage">
                <h3>[ Управление постами ]</h3>
                <div id="manage-list">
                    <p style="font-size: 11px; color: #999;">Загрузка списка...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'WebWklep';
        const REPO = 'TripleStar';
        const FILE_PATH = 'data.json';
        
        let localPostsArray = [];
        let editIndex = null; // Индекс редактируемого поста. Если null — мы в режиме создания.

        // Автоматическая загрузка контента на сайт и в админку
        async function loadPosts() {
            const listContainer = document.getElementById('articles-list');
            const manageContainer = document.getElementById('manage-list');
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
                localPostsArray = await response.json();
                
                // 1. Рендерим главную страницу
                if (localPostsArray.length === 0) {
                    listContainer.innerHTML = '<p style="font-size:12px; color:#999; text-align:center; margin-top:40px;">Архив пуст. Используйте admin login для добавления контента.</p>';
                    manageContainer.innerHTML = '<p style="font-size:11px; color:#999;">Нет постов.</p>';
                    return;
                }

                listContainer.innerHTML = '';
                localPostsArray.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'series-item';
                    item.innerHTML = `
                        <div class="series-header">
                            <span>${post.title}</span>
                            <span>${post.date}</span>
                        </div>
                        ${post.img ? `
                        <div class="media-container">
                            <img src="${post.img}" alt="${post.title}">
                        </div>` : ''}
                        <div class="description">${post.text}</div>
                    `;
                    listContainer.appendChild(item);
                });

                // 2. Рендерим список в админке для удаления и редактирования
                manageContainer.innerHTML = '';
                localPostsArray.forEach((post, index) => {
                    const mItem = document.createElement('div');
                    mItem.className = 'manage-item';
                    mItem.innerHTML = `
                        <span class="manage-item-title">${post.title || '[Без названия]'}</span>
                        <div class="manage-buttons">
                            <button class="action-btn edit-btn" onclick="startEdit(${index})">Редакт</button>
                            <button class="action-btn delete-btn" onclick="deletePost(${index})">Удалить</button>
                        </div>
                    `;
                    manageContainer.appendChild(mItem);
                });

            } catch (err) {
                listContainer.innerHTML = '<p style="font-size:12px; color:red;">Ошибка обновления ленты.</p>';
                console.error(err);
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // Включение режима редактирования
        function startEdit(index) {
            editIndex = index;
            const post = localPostsArray[index];
            
            // Заполняем поля формы данными выбранного поста
            document.getElementById('post-title').value = post.title || '';
            document.getElementById('post-date').value = post.date || '';
            document.getElementById('post-img').value = post.img || '';
            document.getElementById('post-text').value = post.text || '';
            
            // Меняем заголовки и кнопки интерфейса на режим редактирования
            document.getElementById('form-mode-title').innerText = `[ Редактирование поста #${index + 1} ]`;
            document.getElementById('save-btn').innerText = 'Сохранить изменения';
            document.getElementById('cancel-edit-header-btn').style.display = 'inline-block';
            
            // Скроллим форму вверх на мобилках
            document.querySelector('.admin-form').scrollIntoView({ behavior: 'smooth' });
        }

        // Сброс формы в режим создания нового поста
        function resetForm() {
            editIndex = null;
            document.getElementById('post-title').value = '';
            document.getElementById('post-date').value = '';
            document.getElementById('post-img').value = '';
            document.getElementById('post-text').value = '';
            
            document.getElementById('form-mode-title').innerText = '[ Добавить в архив ]';
            document.getElementById('save-btn').innerText = 'Опубликовать';
            document.getElementById('cancel-edit-header-btn').style.display = 'none';
        }

        // Общая функция отправки обновленного массива на GitHub
        async function pushToGitHub(token, updatedArray, commitMessage) {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            let sha = '';
            if (getRes.ok) {
                const getData = await getRes.json();
                sha = getData.sha;
            } else {
                throw new Error('Не удалось синхронизировать версию с GitHub.');
            }

            const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(updatedArray, null, 2))));
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: commitMessage,
                    content: updatedContent,
                    sha: sha
                })
            });

            return putRes.ok;
        }

        // Сохранение материала (И создание нового, и изменение старого)
        async function savePost() {
            const token = document.getElementById('gh-token').value;
            const title = document.getElementById('post-title').value;
            const date = document.getElementById('post-date').value;
            const img = document.getElementById('post-img').value;
            const text = document.getElementById('post-text').value;
            const btn = document.getElementById('save-btn');

            if (!token || !title || !text) {
                return alert('Поля Токен, Название и Текст обязательны для заполнения!');
            }

            btn.disabled = true;
            btn.innerText = 'Сохранение...';

            try {
                let nextPosts = [];
                let commitMsg = '';

                if (editIndex !== null) {
                    // Режим РЕДАКТИРОВАНИЯ: меняем данные конкретного элемента в массиве
                    nextPosts = [...localPostsArray];
                    nextPosts[editIndex] = { title, date, img, text };
                    commitMsg = `Archive Edit: ${title}`;
                } else {
                    // Режим СОЗДАНИЯ нового поста: пушим на самый верх
                    const newPost = { title, date, img, text };
                    nextPosts = [newPost, ...localPostsArray];
                    commitMsg = `Archive Add: ${title}`;
                }

                const success = await pushToGitHub(token, nextPosts, commitMsg);

                if (success) {
                    alert('Успешно сохранено! Изменения отобразятся на сайте в течение минуты.');
                    resetForm();
                    loadPosts();
                } else {
                    alert('Ошибка прав доступа. Проверьте токен GitHub.');
                }
            } catch (err) {
                alert(err.message || 'Сбой сети при сохранении.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = editIndex !== null ? 'Сохранить изменения' : 'Опубликовать';
            }
        }

        // Удаление материала по индексу
        async function deletePost(index) {
            const token = prompt('Для подтверждения удаления введите ваш GitHub токен:');
            if (!token) return;

            if (!confirm(`Вы уверены, что хотите полностью удалить пост "${localPostsArray[index].title}"?`)) return;

            try {
                const nextPosts = localPostsArray.filter((_, i) => i !== index);
                const success = await pushToGitHub(token, nextPosts, `Archive Delete: index ${index}`);

                if (success) {
                    alert('Пост удален! Изменения обновятся в течение минуты.');
                    if (editIndex === index) resetForm(); // Если удалили то, что редактировали — сбрасываем форму
                    loadPosts();
                } else {
                    alert('Ошибка удаления. Проверьте токен.');
                }
            } catch (err) {
                alert(err.message || 'Сбой сети при удалении.');
                console.error(err);
            }
        }

        // Старт скрипта
        loadPosts();
    </script>
</body>
</html>
