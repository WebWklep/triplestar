<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts — Archive</title>
    <style>
        /* Стили полностью скопированы с эстетики референса */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer, .content-container {
            width: 100%;
            max-width: 800px;
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 60px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .series-item {
            margin-bottom: 60px;
            width: 100%;
        }

        .series-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .media-container {
            width: 100%;
            background-color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
            text-align: justify;
        }

        /* Скрытый вход в админку */
        .admin-trigger {
            margin-top: 40px;
            font-size: 10px;
            color: #e0e0e0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-trigger:hover {
            color: #000;
        }

        /* Панель управления */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.99);
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-form {
            max-width: 500px;
            margin: 40px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-form h3 {
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .admin-form input, .admin-form textarea {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 12px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }

        .admin-form button {
            background: #000;
            color: #fff;
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .admin-form button:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <!-- Сюда статьи будут выводиться автоматически -->
    <div class="content-container" id="articles-list">
        <p id="loading-text">Синхронизация с архивом GitHub...</p>
    </div>

    <footer>
        <div class="nav-links">
            <a href="#">Notifications</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
        <div style="text-align: center;">
            <span class="admin-trigger" onclick="toggleAdmin()">• admin login</span>
        </div>
    </footer>

    <!-- Панель админа -->
    <div id="admin-panel">
        <div class="admin-form">
            <h3>[ ДОБАВИТЬ МАТЕРИАЛ В АРХИВ ]</h3>
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token">
            <input type="text" id="post-title" placeholder="НАЗВАНИЕ (например: SERIES 01: BIO POP)">
            <input type="text" id="post-date" placeholder="ДАТА И СТАТУС (например: THE ORIGIN, 2025)">
            <input type="text" id="post-img" placeholder="Имя файла картинки (например: photo.png)">
            <textarea id="post-text" rows="8" placeholder="Текст статьи..."></textarea>
            <button id="save-btn" onclick="savePost()">Опубликовать</button>
            <button style="background:#eee; color:#000; border: 1px solid #ccc;" onclick="toggleAdmin()">Закрыть</button>
        </div>
    </div>

    <script>
        // Твои настройки репозитория TripleStar
        const OWNER = 'WebWklep';
        const REPO = 'TripleStar';
        const FILE_PATH = 'data.json';

        // Автоматическая загрузка контента на сайт
        async function loadPosts() {
            const listContainer = document.getElementById('articles-list');
            try {
                // Обходим кэш гитхаба с помощью ?t=
                const response = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE_PATH}?t=${Date.now()}`);
                const posts = await response.json();
                
                if (posts.length === 0) {
                    listContainer.innerHTML = '<p style="font-size:12px; color:#999; text-align:center; margin-top:40px;">Архив пуст. Используйте admin login для добавления контента.</p>';
                    return;
                }

                listContainer.innerHTML = '';
                posts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'series-item';
                    item.innerHTML = `
                        <div class="series-header">
                            <span>${post.title}</span>
                            <span>${post.date}</span>
                        </div>
                        ${post.img ? `
                        <div class="media-container">
                            <img src="${post.img}" alt="${post.title}">
                        </div>` : ''}
                        <div class="description">${post.text}</div>
                    `;
                    listContainer.appendChild(item);
                });
            } catch (err) {
                listContainer.innerHTML = '<p style="font-size:12px; color:red;">Ошибка обновления ленты.</p>';
                console.error(err);
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            
            // Подгружаем сохраненный в браузере токен, чтобы не вбивать каждый раз
            if(localStorage.getItem('gh_token')) {
                document.getElementById('gh-token').value = localStorage.getItem('gh_token');
            }
        }

        // Публикация нового материала напрямую в репозиторий через API
        async function savePost() {
            const token = document.getElementById('gh-token').value;
            const title = document.getElementById('post-title').value;
            const date = document.getElementById('post-date').value;
            const img = document.getElementById('post-img').value;
            const text = document.getElementById('post-text').value;
            const btn = document.getElementById('save-btn');

            if (!token || !title || !text) {
                return alert('Поля Токен, Название и Текст обязательны для заполнения!');
            }

            localStorage.setItem('gh_token', token);
            btn.disabled = true;
            btn.innerText = 'Отправка данных...';

            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                
                // Шаг 1: Запрашиваем текущую версию data.json для получения SHA коммита
                const getRes = await fetch(url, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                let sha = '';
                let currentPosts = [];
                
                if (getRes.ok) {
                    const getData = await getRes.json();
                    sha = getData.sha;
                    currentPosts = JSON.parse(atob(getData.content));
                }
                
                // Шаг 2: Формируем новый пост и добавляем его на самый верх списка
                const newPost = { title, date, img, text };
                currentPosts.unshift(newPost); 

                // Шаг 3: Переводим всё в Base64 с поддержкой UTF-8
                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(currentPosts, null, 2))));
                
                // Шаг 4: Отправляем обновленный файл на GitHub
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Archive Update: ${title}`,
                        content: updatedContent,
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    alert('Успешно опубликовано! Страница обновится в течение 30-60 секунд.');
                    toggleAdmin();
                    // Сбрасываем поля текста
                    document.getElementById('post-title').value = '';
                    document.getElementById('post-date').value = '';
                    document.getElementById('post-img').value = '';
                    document.getElementById('post-text').value = '';
                    loadPosts();
                } else {
                    const errData = await putRes.json();
                    alert(`Ошибка прав доступа: ${errData.message}. Убедитесь, что у вашего токена включена галочка "repo".`);
                }
            } catch (err) {
                alert('Сбой сети при отправке запроса.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Опубликовать';
            }
        }

        // Старт скрипта
        loadPosts();
    </script>
</body>
</html>
