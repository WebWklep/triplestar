<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arts — Archive</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer, .content-container {
            width: 100%;
            max-width: 800px;
        }

        .nav-links {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 60px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-links a {
            color: #000000;
            text-decoration: none;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .series-item {
            margin-bottom: 60px;
            width: 100%;
        }

        .series-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .media-container {
            width: 100%;
            background-color: #ffffff;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .description {
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
            text-align: justify;
        }

        .admin-trigger {
            margin-top: 40px;
            font-size: 10px;
            color: #e0e0e0;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-trigger:hover {
            color: #000;
        }

        #admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.99);
            z-index: 1000;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .admin-layout {
            max-width: 800px;
            margin: 40px auto 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-form h3, .admin-manage h3 {
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .admin-form input, .admin-form textarea {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 12px;
            border: 1px solid #000;
            width: 100%;
            box-sizing: border-box;
            background: #fff;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .checkbox-container input {
            width: auto;
            cursor: pointer;
        }

        .admin-form button, .action-btn {
            background: #000;
            color: #fff;
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            transition: background 0.2s;
        }
        .admin-form button:hover {
            background: #333;
        }

        .admin-manage {
            border-left: 1px solid #eee;
            padding-left: 20px;
        }
        @media (max-width: 768px) {
            .admin-manage {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #eee;
                padding-top: 20px;
            }
        }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 12px;
            gap: 10px;
        }

        .manage-item-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-grow: 1;
            max-width: 200px;
        }

        .manage-item-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-badge {
            font-size: 9px;
            color: #999;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .manage-buttons {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 6px 10px;
            font-size: 10px;
        }
        .edit-btn {
            background: #2196F3;
        }
        .edit-btn:hover {
            background: #0b7dda;
        }
        .delete-btn {
            background: #ff4d4d;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

    <div class="content-container" id="articles-list">
        <p id="loading-text">Connecting to sync nodes...</p>
    </div>

    <footer>
        <div class="nav-links">
            <a href="#">Notifications</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
        </div>
        <div style="text-align: center;">
            <span class="admin-trigger" onclick="toggleAdmin()">• admin login</span>
        </div>
    </footer>

    <div id="admin-panel">
        <div style="max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <button id="cancel-edit-header-btn" style="background:#fff; color:#ff4d4d; border: 1px solid #ff4d4d; font-family: monospace; padding: 8px 16px; cursor:pointer; display:none;" onclick="resetForm()">CANCEL EDIT MODE</button>
            <span style="flex-grow: 1;"></span>
            <button style="background:#eee; color:#000; border: 1px solid #ccc; font-family: monospace; padding: 8px 16px; cursor:pointer;" onclick="toggleAdmin()">CLOSE DASHBOARD</button>
        </div>
        
        <div class="admin-layout">
            <div class="admin-form">
                <h3 id="form-mode-title">[ Append to Archive ]</h3>
                <input type="password" id="gh-token" placeholder="GitHub Personal Access Token" oninput="updateTokenFromInput(this.value)">
                <input type="text" id="post-title" placeholder="TITLE (e.g. SERIES 01: BIO POP)">
                <input type="text" id="post-date" placeholder="DATE & STATUS (e.g. THE ORIGIN, 2025)">
                <input type="text" id="post-img" placeholder="Image asset filename (e.g. asset.png)">
                <textarea id="post-text" rows="8" placeholder="Editorial text body content..."></textarea>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="post-draft">
                    Save as Draft (Hide from main page)
                </label>
                
                <button id="save-btn" onclick="savePost()">Publish</button>
            </div>

            <div class="admin-manage">
                <h3>[ Archive Management ]</h3>
                <div id="manage-list">
                    <p style="font-size: 11px; color: #999;">Initializing registry interface...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'WebWklep';
        const REPO = 'TripleStar';
        const FILE_PATH = 'data.json';
        
        let localPostsArray = [];
        let editIndex = null;
        let globalToken = '';

        function decodeBase64UTF8(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        function encodeBase64UTF8(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        // Следит за вводом токена и мгновенно перезапускает загрузку
        function updateTokenFromInput(val) {
            globalToken = val.trim();
            if (globalToken.length > 10) { 
                loadPosts();
            }
        }

        async function loadPosts() {
            const listContainer = document.getElementById('articles-list');
            const manageContainer = document.getElementById('manage-list');
            
            try {
                let url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
                let headers = { 'Cache-Control': 'no-cache' };
                
                if (globalToken) {
                    headers['Authorization'] = `token ${globalToken}`;
                }

                let response = await fetch(url, { headers });
                
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }

                const fileData = await response.json();
                const decodedText = decodeBase64UTF8(fileData.content);
                
                try {
                    localPostsArray = JSON.parse(decodedText);
                } catch(e) {
                    localPostsArray = [];
                }

                if (!Array.isArray(localPostsArray)) localPostsArray = [];

                const visiblePosts = localPostsArray.filter(post => !post.isDraft);
                if (visiblePosts.length === 0) {
                    listContainer.innerHTML = '<p style="font-size:12px; color:#999; text-align:center; margin-top:40px;">Archive index is empty or entries are currently set to draft.</p>';
                } else {
                    listContainer.innerHTML = '';
                    visiblePosts.forEach(post => {
                        const item = document.createElement('div');
                        item.className = 'series-item';
                        item.innerHTML = `
                            <div class="series-header">
                                <span>${post.title || ''}</span>
                                <span>${post.date || ''}</span>
                            </div>
                            ${post.img ? `
                            <div class="media-container">
                                <img src="${post.img}" alt="${post.title || ''}">
                            </div>` : ''}
                            <div class="description">${post.text || ''}</div>
                        `;
                        listContainer.appendChild(item);
                    });
                }

                if (localPostsArray.length === 0) {
                    manageContainer.innerHTML = '<p style="font-size:11px; color:#999;">[ Registry Connected: Dataset is Empty ]</p>';
                    return;
                }

                manageContainer.innerHTML = '';
                localPostsArray.forEach((post, index) => {
                    const mItem = document.createElement('div');
                    mItem.className = 'manage-item';
                    const statusText = post.isDraft ? '👁‍🗨 Draft / Hidden' : '👁 Public View';

                    mItem.innerHTML = `
                        <div class="manage-item-meta">
                            <span class="manage-item-title">${post.title || '[Untitled Entry]'}</span>
                            <span class="status-badge">${statusText}</span>
                        </div>
                        <div class="manage-buttons">
                            <button class="action-btn edit-btn" onclick="startEdit(${index})">Edit</button>
                            <button class="action-btn delete-btn" onclick="deletePost(${index})">Delete</button>
                        </div>
                    `;
                    manageContainer.appendChild(mItem);
                });

            } catch (err) {
                listContainer.innerHTML = `<p style="font-size:12px; color:red; text-align:center; margin-top:40px;">
                    [SYSTEM SYNC FAILURE]<br><br>
                    Trace: Access key signature missing or invalid.<br><br>
                    Open "admin login" and insert GitHub Token footprint.
                </p>`;
                manageContainer.innerHTML = '<p style="font-size:11px; color:red;">Sync failed.</p>';
            }
        }

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            if (globalToken && !document.getElementById('gh-token').value) {
                document.getElementById('gh-token').value = globalToken;
            }
        }

        function startEdit(index) {
            editIndex = index;
            const post = localPostsArray[index];
            
            document.getElementById('post-title').value = post.title || '';
            document.getElementById('post-date').value = post.date || '';
            document.getElementById('post-img').value = post.img || '';
            document.getElementById('post-text').value = post.text || '';
            document.getElementById('post-draft').checked = !!post.isDraft;
            
            document.getElementById('form-mode-title').innerText = `[ Modify Entry #${index + 1} ]`;
            document.getElementById('save-btn').innerText = 'Save Modifications';
            document.getElementById('cancel-edit-header-btn').style.display = 'inline-block';
            
            document.querySelector('.admin-form').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            editIndex = null;
            document.getElementById('post-title').value = '';
            document.getElementById('post-date').value = '';
            document.getElementById('post-img').value = '';
            document.getElementById('post-text').value = '';
            document.getElementById('post-draft').checked = false;
            
            document.getElementById('form-mode-title').innerText = '[ Append to Archive ]';
            document.getElementById('save-btn').innerText = 'Publish';
            document.getElementById('cancel-edit-header-btn').style.display = 'none';
        }

        async function pushToGitHub(token, updatedArray, commitMessage) {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            let sha = '';
            if (getRes.ok) {
                const getData = await getRes.json();
                sha = getData.sha;
            } else {
                throw new Error('Registry query failed. Invalid token scope map.');
            }

            const updatedContent = encodeBase64UTF8(JSON.stringify(updatedArray, null, 2));
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: commitMessage,
                    content: updatedContent,
                    sha: sha
                })
            });

            return putRes.ok;
        }

        async function savePost() {
            const token = document.getElementById('gh-token').value;
            const title = document.getElementById('post-title').value;
            const date = document.getElementById('post-date').value;
            const img = document.getElementById('post-img').value;
            const text = document.getElementById('post-text').value;
            const isDraft = document.getElementById('post-draft').checked;
            const btn = document.getElementById('save-btn');

            if (!token || !title || !text) {
                return alert('Required keys missing: Token, Title, and Editorial Content text.');
            }

            globalToken = token;
            btn.disabled = true;
            btn.innerText = 'Processing sync operational loop...';

            try {
                let nextPosts = [];
                let commitMsg = '';

                if (editIndex !== null) {
                    nextPosts = [...localPostsArray];
                    nextPosts[editIndex] = { title, date, img, text, isDraft };
                    commitMsg = `Archive Node Modification: ${title}`;
                } else {
                    const newPost = { title, date, img, text, isDraft };
                    nextPosts = [newPost, ...localPostsArray];
                    commitMsg = `Archive New Payload Entry: ${title}`;
                }

                const success = await pushToGitHub(token, nextPosts, commitMsg);

                if (success) {
                    alert('Data sync approved. Cloud server page content should refresh within 60 seconds.');
                    resetForm();
                    loadPosts();
                } else {
                    alert('Access denied. Verify security configurations.');
                }
            } catch (err) {
                alert(err.message || 'Fatal endpoint response breakdown.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = editIndex !== null ? 'Save Modifications' : 'Publish';
            }
        }

        async function deletePost(index) {
            const token = prompt('Security authorization mandatory. Input Token footprint credentials:');
            if (!token) return;

            if (!confirm(`Purge selected asset file registry target permanently: "${localPostsArray[index].title}"?`)) return;

            try {
                const nextPosts = localPostsArray.filter((_, i) => i !== index);
                const success = await pushToGitHub(token, nextPosts, `Archive Node Purge: index ${index}`);

                if (success) {
                    alert('Target purged successfully.');
                    if (editIndex === index) resetForm();
                    loadPosts();
                } else {
                    alert('Purge deployment unauthorized.');
                }
            } catch (err) {
                alert(err.message || 'System network error.');
                console.error(err);
            }
        }

        loadPosts();
    </script>
</body>
</html>
